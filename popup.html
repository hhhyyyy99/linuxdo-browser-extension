<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>LinuxDo Auto Browse</h1>

    <div id="status-bar">
      <span id="status-dot"></span>
      <span id="status-text">就绪</span>
    </div>

    <div id="progress" class="hidden">
      <div id="progress-text"></div>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <div id="topic-info" class="hidden">
      <div id="topic-title"></div>
    </div>

    <div class="settings-control">
      <div class="settings-label">浏览速度: <span id="speed-text">慢速</span></div>
      <div class="settings-slider-row">
        <span class="settings-edge-label">慢</span>
        <input type="range" id="speed-slider" min="1" max="5" step="1" value="2">
        <span class="settings-edge-label">快</span>
      </div>
    </div>

    <div class="settings-control">
      <div class="settings-label">帖子数量: <span id="limit-text">∞</span></div>
      <div class="settings-input-row">
        <input type="number" id="post-limit" min="0" step="1" placeholder="无限" value="">
        <span class="settings-hint">留空或0 = 无限</span>
      </div>
    </div>

    <div class="buttons">
      <button id="btn-start" class="btn btn-start">开始浏览</button>
      <button id="btn-stop" class="btn btn-stop hidden">停止</button>
      <button id="btn-view" class="btn btn-view hidden">查看标签</button>
    </div>

    <div id="error-msg" class="hidden"></div>

    <div class="hint">
      <p>先打开 linux.do，再点开始，标签会自动归组</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
